server:
  port: 8084

spring:
  application:
    name: statement-service

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3309/statement_db}
    username: ${DB_USERNAME:statement_user}
    password: ${DB_PASSWORD:statement_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false

    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

aws:
  region: us-east-1

  sqs:
    endpoint: ${AWS_SQS_ENDPOINT:http://localhost:4566}

    statement-queue-url: ${STATEMENT_QUEUE_URL:http://localhost:4566/000000000000/statement-queue}

  s3:
    endpoint: ${AWS_S3_ENDPOINT:http://localhost:4566}
    bucket-name: investment-statements

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics

  endpoint:
    prometheus:
      access: unrestricted

  metrics:
    tags:
      application: ${spring.application.name}

  tracing:
    sampling:
      probability: 1.0

  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

logging:
  pattern:
    level: "%5p [traceId=%X{traceId}]"

springdoc:
  api-docs:
    path: /v3/api-docs

  swagger-ui:
    path: /swagger-ui.html