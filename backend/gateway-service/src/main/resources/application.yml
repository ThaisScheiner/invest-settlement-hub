server:
  port: 8080

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: order-service
              uri: ${ORDER_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/orders/**

            - id: settlement-service
              uri: ${SETTLEMENT_SERVICE_URL:http://localhost:8082}
              predicates:
                - Path=/settlements/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics

  endpoint:
    prometheus:
      access: unrestricted

  metrics:
    tags:
      application: ${spring.application.name}

  tracing:
    sampling:
      probability: 1.0

  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

logging:
  pattern:
    level: "%5p [traceId=%X{traceId}]"

jwt:
  secret: ${JWT_SECRET:minha-chave-super-secreta-invest-1234567890}