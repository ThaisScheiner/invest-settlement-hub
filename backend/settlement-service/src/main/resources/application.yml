server:
  port: 8082

spring:
  application:
    name: settlement-service

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3308/settlement_db}
    username: ${DB_USERNAME:settlement_user}
    password: ${DB_PASSWORD:settlement_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

aws:
  region: us-east-1
  sqs:
    endpoint: ${AWS_SQS_ENDPOINT:http://localhost:4566}
    order-created-queue-url: ${ORDER_CREATED_QUEUE_URL:http://localhost:4566/000000000000/order-created-queue}

management:
  endpoints:
    web:
      exposure:
        include: health,info