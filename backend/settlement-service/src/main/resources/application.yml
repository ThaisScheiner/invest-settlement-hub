server:
  port: 8082

spring:
  application:
    name: settlement-service

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3308/settlement_db}
    username: ${DB_USERNAME:settlement_user}
    password: ${DB_PASSWORD:settlement_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

aws:
  region: us-east-1
  sqs:
    endpoint: ${AWS_SQS_ENDPOINT:http://localhost:4566}
    order-created-queue-url: ${ORDER_CREATED_QUEUE_URL:http://localhost:4566/000000000000/order-created-queue}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

resilience4j:
  circuitbreaker:
    instances:
      settlementProcessor:
        sliding-window-size: 5
        minimum-number-of-calls: 3
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 2
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics

  endpoint:
    prometheus:
      access: unrestricted

  metrics:
    tags:
      application: ${spring.application.name}

  tracing:
    sampling:
      probability: 1.0

  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

logging:
  pattern:
    level: "%5p [traceId=%X{traceId}]"