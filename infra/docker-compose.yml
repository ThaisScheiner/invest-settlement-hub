services:
  mysql-order:
    image: mysql:8.0
    container_name: mysql-order-service
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: order_db
      MYSQL_USER: order_user
      MYSQL_PASSWORD: order_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_order_data:/var/lib/mysql
    networks:
      - investment-network

  mysql-settlement:
    image: mysql:8.0
    container_name: mysql-settlement-service
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: settlement_db
      MYSQL_USER: settlement_user
      MYSQL_PASSWORD: settlement_pass
    ports:
      - "3308:3306"
    volumes:
      - mysql_settlement_data:/var/lib/mysql
    networks:
      - investment-network

  localstack:
    image: localstack/localstack:latest
    container_name: localstack-investment
    ports:
      - "4566:4566"
    environment:
      SERVICES: sqs,sns,s3,eventbridge
      DEFAULT_REGION: us-east-1
    networks:
      - investment-network

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: zipkin
    ports:
      - "9411:9411"
    networks:
      - investment-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - investment-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - investment-network

volumes:
  mysql_order_data:
  mysql_settlement_data:

networks:
  investment-network:
    driver: bridge